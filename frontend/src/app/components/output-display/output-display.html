<div class="output-card">
  <div class="output-header">
    <div class="dots-container">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <span class="title">Resultado de la IA</span>

    <button *ngIf="result && !loading" (click)="copyToClipboard(result)" class="copy-btn">
      Copiar 📋
    </button>
  </div>

  <div class="output-body">
    <div *ngIf="loading" class="loader-container">
      <div class="spinner"></div>
      <p>La IA está pensando...</p>
    </div>

    <pre *ngIf="!loading && result" class="result-text">{{ result }}</pre>

    <p *ngIf="!loading && !result" class="placeholder-text">
      Aquí aparecerá la respuesta técnica...
    </p>
  </div>

  <div class="toast-container" [class.show]="showToast">
    <div class="toast-content">
      <span class="toast-icon">✨</span>
      <p>¡Código copiado!</p>
    </div>
  </div>
</div>
